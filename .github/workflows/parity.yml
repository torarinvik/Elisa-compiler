name: parity

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lexer-parity:
    name: lexer parity (stage1 == stage0)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout stage1 (Elisa-compiler)
        uses: actions/checkout@v4
        with:
          path: Elisa-compiler

      # The parity harness builds elisac from source and links a stage0 lexer
      # oracle against the Go compiler package, so we need the Elisa-core repo
      # too. Default branch (main); both repos are public.
      - name: Checkout stage0 (Elisa-core)
        uses: actions/checkout@v4
        with:
          repository: torarinvik/Elisa-core
          path: Elisa-core

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: Elisa-core/compiler/go.sum

      # LLVM 19 + clang, matching Elisa-core's #cgo stanzas and the harness's
      # clang link step.
      - name: Install LLVM 19 + clang
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev clang-19
          # Ubuntu folds the C API into libLLVM.so, but the #cgo stanza links -lLLVM-C
          sudo ln -sf libLLVM.so /usr/lib/llvm-19/lib/libLLVM-C.so
          sudo ln -sf /usr/bin/clang-19  /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-19 /usr/local/bin/clang++

      # Building the stage1 std (elisacore_std/arena.elisa: min/clamp contracts)
      # runs contract verification, which is proof-strict by default and needs
      # the SMT tier to discharge. Pin z3 4.16 — distro z3 (apt 4.8) is too old
      # and returns WRONG verification results.
      - name: Install z3 4.16
        run: |
          set -e
          Z=z3-4.16.0-x64-glibc-2.39.zip
          curl -fsSL -o z3.zip "https://github.com/Z3Prover/z3/releases/download/z3-4.16.0/$Z"
          unzip -q z3.zip
          D="${Z%.zip}"
          chmod +x "$D/bin/z3"
          echo "$PWD/$D/bin" >> "$GITHUB_PATH"
          "$D/bin/z3" --version

      - name: Lexer parity
        working-directory: Elisa-compiler
        env:
          ELISA_CORE: ${{ github.workspace }}/Elisa-core
        run: test/parity/run_parity.sh

      - name: Lexer throughput bench (informational)
        continue-on-error: true
        working-directory: Elisa-compiler
        env:
          ELISA_CORE: ${{ github.workspace }}/Elisa-core
        run: ITERS=1000 test/parity/lexer_bench.sh

  # Windows: the native-executable link+run path isn't wired yet (Elisa-core's
  # own CI only does a codegen smoke on Windows), so we don't run the lexer here.
  # Instead we prove the stage1 lexer COMPILES and emits a real object on Windows:
  # build elisac, then -emit obj the export-anchored smoke_harness (no link/run).
  # z3 isn't needed because the smoke compiles -permissive.
  stage1-codegen-windows:
    name: stage1 codegen smoke (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      # Backend auto-split files have ~218-char names; Windows needs long paths.
      - name: Enable git long paths
        run: git config --global core.longpaths true

      - name: Checkout stage1 (Elisa-compiler)
        uses: actions/checkout@v4
        with:
          path: Elisa-compiler

      - name: Checkout stage0 (Elisa-core)
        uses: actions/checkout@v4
        with:
          repository: torarinvik/Elisa-core
          path: Elisa-core

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: Elisa-core/compiler/go.sum

      - name: Install MinGW gcc + LLVM (MSYS2 preinstalled at C:\msys64)
        run: C:/msys64/usr/bin/bash.exe -lc "pacman -Sy --noconfirm && pacman -S --noconfirm --needed mingw-w64-x86_64-gcc mingw-w64-x86_64-llvm"

      - name: Build elisac (CGO + MinGW)
        working-directory: Elisa-core/compiler
        env:
          CGO_ENABLED: "1"
        run: |
          export PATH="/c/msys64/mingw64/bin:$PATH"   # gcc at build, libLLVM dll at build+run
          export CC=gcc CXX=g++
          go build -o elisac.exe ./src

      # Pure relative-path invocation: passing MSYS-style absolute paths to the
      # native elisac.exe is unreliable, so we cd into the repo and reference the
      # compiler and harness by relative path only.
      - name: stage1 codegen smoke
        working-directory: Elisa-compiler
        run: |
          export PATH="/c/msys64/mingw64/bin:$PATH"   # libLLVM dll needed at codegen time
          ../Elisa-core/compiler/elisac.exe -emit obj -permissive -o smoke.o test/parity/smoke_harness.elisa
          sz=$(wc -c < smoke.o)
          echo "stage1 lexer object: $sz bytes"
          if [ "$sz" -le 8192 ]; then
            echo "codegen smoke FAILED: object too small ($sz bytes) — lexer codegen stripped/empty" >&2
            exit 1
          fi
          echo "codegen smoke OK"
