name: parity

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lexer-parity:
    name: lexer parity (stage1 == stage0)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout stage1 (Elisa-compiler)
        uses: actions/checkout@v4
        with:
          path: Elisa-compiler

      # The parity harness builds elisac from source and links a stage0 lexer
      # oracle against the Go compiler package, so we need the Elisa-core repo
      # too. Default branch (main); both repos are public.
      - name: Checkout stage0 (Elisa-core)
        uses: actions/checkout@v4
        with:
          repository: torarinvik/Elisa-core
          path: Elisa-core

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: Elisa-core/compiler/go.sum

      # LLVM 19 + clang, matching Elisa-core's #cgo stanzas and the harness's
      # clang link step.
      - name: Install LLVM 19 + clang
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev clang-19
          # Ubuntu folds the C API into libLLVM.so, but the #cgo stanza links -lLLVM-C
          sudo ln -sf libLLVM.so /usr/lib/llvm-19/lib/libLLVM-C.so
          sudo ln -sf /usr/bin/clang-19  /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-19 /usr/local/bin/clang++

      - name: Lexer parity
        working-directory: Elisa-compiler
        env:
          ELISA_CORE: ${{ github.workspace }}/Elisa-core
        run: test/parity/run_parity.sh

      - name: Lexer throughput bench (informational)
        continue-on-error: true
        working-directory: Elisa-compiler
        env:
          ELISA_CORE: ${{ github.workspace }}/Elisa-core
        run: ITERS=1000 test/parity/lexer_bench.sh
